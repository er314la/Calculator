body {

    background: #111;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
}
#container {
    position: relative;
    width: 1024px;
    max-width: 95vw;
}
#bg {
    width: 100%;
    display: block;
    border-radius: 12px;
}
.hotspot {
    position: absolute;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s ease;
}
.hotspot:hover {
    background: rgba(255,255,255,0.15);
}
#dialog {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    width: min(500px, 90vw);
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    display: none;
    z-index: 1000;
}
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    z-index: 999;
}
.close {
    float: right;
    cursor: pointer;
    font-size: 24px;
    font-weight: bold;
}
h2 {
    margin-top: 0;
}
</style>
</head>

    el.style.top = (h.y / 1474 * 100) + '%';
    el.style.width = (h.w / 1024 * 100) + '%';

        document.getElementById('description').innerText = h.desc;
        document.getElementById('dialog').style.display = 'block';
