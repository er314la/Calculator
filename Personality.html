<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Elements Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Playfair Display', sans-serif;
        }

        .background-image {
            background-image: url('IMG_4883.jpeg'); /* Replace with actual hosted image URL if needed */
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hotspot:hover {
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
        }

        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">
    <div class="relative h-screen w-screen flex items-center justify-center">
        <!-- Background Image Container -->
        <div id="image-container" 
             class="background-image w-[95%] max-w-[1200px] h-[90vh] relative rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
            
            <!-- Hotspots will be added by JavaScript -->
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50">
        <div class="modal bg-zinc-900 rounded-3xl max-w-lg w-full mx-4 overflow-hidden shadow-2xl">
            <!-- Modal Header -->
            <div class="px-8 pt-8 pb-4 border-b border-white/10 flex items-start gap-4">
                <div id="modal-icon" class="w-12 h-12 flex-shrink-0 text-4xl"></div>
                <div>
                    <h2 id="modal-title" class="text-3xl title-font font-bold text-white"></h2>
                    <p id="modal-category" class="text-blue-400 text-sm font-medium tracking-widest mt-1"></p>
                </div>
            </div>
            
            <!-- Modal Content -->
            <div class="p-8">
                <p id="modal-description" class="text-zinc-300 leading-relaxed text-lg"></p>
            </div>
            
            <!-- Footer -->
            <div class="px-8 py-6 bg-black/40 border-t border-white/10 flex justify-end">
                <button onclick="closeModal()" 
                        class="px-8 py-3 bg-white text-zinc-900 hover:bg-white/90 transition-colors font-semibold rounded-2xl">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data extracted from the chart
        const elements = [
            // EMOTIONS (top row)
            {
                id: "emotion",
                title: "Emotion",
                category: "EMOTIONS",
                description: "Mental states which color all thought for a period of time.",
                x: "8%", y: "8%", width: "12%", height: "12%"
            },
            {
                id: "angst",
                title: "Angst",
                category: "EMOTIONS",
                description: "The fear that your life will be meaningless – which can be a type of motivation.",
                x: "22%", y: "8%", width: "12%", height: "12%"
            },
            {
                id: "empathy",
                title: "Empathy / Sympathy",
                category: "EMOTIONS",
                description: "The ability to share emotions & caring with & for others, & to react appropriately.",
                x: "36%", y: "8%", width: "12%", height: "12%"
            },
            {
                id: "fear",
                title: "Fear",
                category: "EMOTIONS",
                description: "The dread of failure, uncertainty, risk & loss. A type or instinct or motivation.",
                x: "50%", y: "8%", width: "12%", height: "12%"
            },
            {
                id: "love",
                title: "Love",
                category: "EMOTIONS",
                description: "The ability to demonstrate unconditional loyalty, deep affection & benevolent concern for others.",
                x: "64%", y: "8%", width: "12%", height: "12%"
            },
            
            // IDENTITY
            {
                id: "failure",
                title: "Failure",
                category: "IDENTITY",
                description: "Humans are not infallible, so will often make mistakes, misjudge or fail.",
                x: "8%", y: "25%", width: "12%", height: "12%"
            },
            {
                id: "growth",
                title: "Growth",
                category: "IDENTITY",
                description: "The drive to explore, improve & grow.",
                x: "22%", y: "25%", width: "12%", height: "12%"
            },
            {
                id: "instinct",
                title: "Instinct",
                category: "IDENTITY",
                description: "The ability override instinct with higher level thought processes.",
                x: "36%", y: "25%", width: "12%", height: "12%"
            },
            {
                id: "intuition",
                title: "Intuition",
                category: "IDENTITY",
                description: "Opinions & feelings formed by unconscious knowledge & hidden processes.",
                x: "50%", y: "25%", width: "12%", height: "12%"
            },
            {
                id: "need",
                title: "Need",
                category: "IDENTITY",
                description: "Humans are born with physical & emotional needs that must be regularly satisfied to avoid pain & decline.",
                x: "64%", y: "25%", width: "12%", height: "12%"
            },
            
            // More IDENTITY row 2
            {
                id: "motivation",
                title: "Motivation",
                category: "IDENTITY",
                description: "A wide variety of desires that drive us, as compared to animals – such as finding food & procreating.",
                x: "8%", y: "39%", width: "12%", height: "12%"
            },
            {
                id: "resilience",
                title: "Resilience",
                category: "IDENTITY",
                description: "Humans can learn from failures, risk-taking & stressors – to become stronger.",
                x: "22%", y: "39%", width: "12%", height: "12%"
            },
            {
                id: "self",
                title: "Self",
                category: "IDENTITY",
                description: "The need to defend what we view as our self-interests, to have a sense of self-esteem & self-importance.",
                x: "36%", y: "39%", width: "12%", height: "12%"
            },
            {
                id: "strengths",
                title: "Strengths",
                category: "IDENTITY",
                description: "Humans are highly capable & well adapted to life on Planet Earth.",
                x: "50%", y: "39%", width: "12%", height: "12%"
            },
            {
                id: "weakness",
                title: "Weakness",
                category: "IDENTITY",
                description: "Humans often lack abilities that would be advantageous to their life.",
                x: "64%", y: "39%", width: "12%", height: "12%"
            },
            
            // MENTAL
            {
                id: "communication",
                title: "Communication",
                category: "MENTAL",
                description: "The desire to connect with others using various means of expression (language, art, music, stories...).",
                x: "8%", y: "54%", width: "12%", height: "12%"
            },
            {
                id: "concepts",
                title: "Concepts",
                category: "MENTAL",
                description: "Thinking in ways that differ from reality – such as Language having many concepts without a direct physical equivalent.",
                x: "22%", y: "54%", width: "12%", height: "12%"
            },
            {
                id: "experiments",
                title: "Experiments",
                category: "MENTAL",
                description: "Human curiosity & activity trying to discover new knowledge.",
                x: "36%", y: "54%", width: "12%", height: "12%"
            },
            {
                id: "imagination",
                title: "Imagination",
                category: "MENTAL",
                description: "The ability to think in ways that differ from concrete reality.",
                x: "50%", y: "54%", width: "12%", height: "12%"
            },
            {
                id: "introspection",
                title: "Introspection",
                category: "MENTAL",
                description: "The ability to examine our own character, thinking, actions & emotions – in order to self-improve.",
                x: "64%", y: "54%", width: "12%", height: "12%"
            },
            
            // Additional MENTAL items
            {
                id: "knowledge",
                title: "Knowledge",
                category: "MENTAL",
                description: "The ability to understand things, & share this information.",
                x: "8%", y: "68%", width: "12%", height: "12%"
            },
            {
                id: "language",
                title: "Language",
                category: "MENTAL",
                description: "The ability to share by communicating with words & complex thoughts.",
                x: "22%", y: "68%", width: "12%", height: "12%"
            },
            {
                id: "memory",
                title: "Memory",
                category: "MENTAL",
                description: "The ability to remember information for a lifetime. They are often fuzzy & surrounded with emotions such as nostalgia.",
                x: "36%", y: "68%", width: "12%", height: "12%"
            },
            {
                id: "rational-thought",
                title: "Rational Thought",
                category: "MENTAL",
                description: "The ability to consider evidence in a systematic way to form opinions.",
                x: "50%", y: "68%", width: "12%", height: "12%"
            },
            {
                id: "strategy",
                title: "Strategy",
                category: "MENTAL",
                description: "The ability to think out a series of action that will achieve a goal in the long term.",
                x: "64%", y: "68%", width: "12%", height: "12%"
            },
            
            // SOCIAL row
            {
                id: "altruism",
                title: "Altruism",
                category: "SOCIAL",
                description: "An unselfish desire to make things better, even if it means personal sacrifice.",
                x: "8%", y: "82%", width: "12%", height: "12%"
            },
            {
                id: "civility",
                title: "Civility",
                category: "SOCIAL",
                description: "The ability to organize into communities, societies & cultures, & to conform to a shared set of rules, in order to live peaceably.",
                x: "22%", y: "82%", width: "12%", height: "12%"
            },
            {
                id: "competition",
                title: "Competition",
                category: "SOCIAL",
                description: "The ability to engage in social or business challenges, in games, sports & other pursuits.",
                x: "36%", y: "82%", width: "12%", height: "12%"
            },
            {
                id: "conflict",
                title: "Conflict",
                category: "SOCIAL",
                description: "Tendency for civility & diplomacy to break down between individuals or groups.",
                x: "50%", y: "82%", width: "12%", height: "12%"
            },
            {
                id: "diplomacy",
                title: "Diplomacy",
                category: "SOCIAL",
                description: "The ability of groups / nations to use communication & understanding to resolve differences.",
                x: "64%", y: "82%", width: "12%", height: "12%"
            }
        ];

        // Create hotspots
        function createHotspots() {
            const container = document.getElementById('image-container');
            
            elements.forEach(item => {
                const hotspot = document.createElement('div');
                hotspot.className = 'hotspot rounded-2xl';
                hotspot.style.left = item.x;
                hotspot.style.top = item.y;
                hotspot.style.width = item.width;
                hotspot.style.height = item.height;
                hotspot.style.borderRadius = '12px';
                
                hotspot.onclick = () => showModal(item);
                container.appendChild(hotspot);
            });
        }

        // Show modal
        function showModal(item) {
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-category').textContent = item.category;
            document.getElementById('modal-description').textContent = item.description;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        // Close modal
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Initialize
        window.onload = function() {
            createHotspots();
            
            // Close modal when clicking outside
            const modal = document.getElementById('modal');
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });
            
            // Keyboard escape support
            document.addEventListener('keydown', function(e) {
                if (e.key === "Escape") {
                    closeModal();
                }
            });
            
            // Tailwind script already loaded
            console.log('%cHuman Elements Explorer ready 🧠', 'color: #3b82f6; font-size: 14px; font-weight: 600;');
        };
    </script>
</body>
</html>
