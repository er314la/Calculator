<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Human Experience Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a4a4a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        /* Modal Animation */
        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
        }
        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 300ms ease-out, transform 300ms ease-out;
        }
        .modal-exit {
            opacity: 1;
            transform: scale(1);
        }
        .modal-exit-active {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 200ms ease-in, transform 200ms ease-in;
        }

        /* Hotspot Pulse */
        .hotspot-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .map-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: #fff; /* Fallback */
        }

        .interactive-area {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            border-radius: 8px;
            /* Debug: background: rgba(255,0,0,0.1); border: 1px solid red; */
        }

        .interactive-area:hover {
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            z-index: 20;
        }

        /* Specific Category Colors for UI accents */
        .cat-emotions { color: #ef4444; border-color: #ef4444; }
        .cat-identity { color: #3b82f6; border-color: #3b82f6; }
        .cat-mental { color: #22c55e; border-color: #22c55e; }
        .cat-social { color: #a855f7; border-color: #a855f7; }
        .cat-activity { color: #f97316; border-color: #f97316; }
        .cat-expression { color: #06b6d4; border-color: #06b6d4; }
        .cat-spirit { color: #eab308; border-color: #eab308; }

    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="w-full py-6 px-4 text-center z-50 relative bg-gradient-to-b from-black/80 to-transparent">
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
            The Human Experience Map
        </h1>
        <p class="text-gray-400 text-sm md:text-base max-w-2xl mx-auto">
            Explore the facets of human nature. Click on any concept in the image below to reveal its meaning.
        </p>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow relative w-full flex justify-center items-start p-4">
        
        <!-- Map Wrapper -->
        <div class="map-container shadow-2xl rounded-xl overflow-hidden relative select-none" id="mapWrapper">
            <!-- The Background Image -->
            <img src="IMG_4883.jpeg" 
                 alt="Human Experience Infographic" 
                 class="w-full h-auto block"
                 draggable="false">

            <!-- Interactive Overlay Container (Populated by JS) -->
            <div id="overlay-layer" class="absolute inset-0 w-full h-full pointer-events-none">
                <!-- Hotspots will be injected here with pointer-events-auto -->
            </div>
        </div>

    </main>

    <!-- Modal / Dialog Box -->
    <div id="modal-backdrop" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div id="modal-content" class="glass-panel w-full max-w-lg rounded-2xl p-6 md:p-8 shadow-2xl transform transition-all duration-300 scale-95 opacity-0 relative">
            
            <!-- Close Button -->
            <button id="close-modal" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors p-2 rounded-full hover:bg-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Content -->
            <div class="flex flex-col items-start">
                <div id="modal-category-badge" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-3 border bg-opacity-20 bg-white">
                    Category
                </div>
                
                <h2 id="modal-title" class="text-3xl font-bold mb-4 text-white leading-tight">
                    Title Here
                </h2>
                
                <div class="w-12 h-1 bg-white/20 rounded mb-6"></div>
                
                <p id="modal-description" class="text-gray-300 text-lg leading-relaxed">
                    Description goes here.
                </p>

                <div class="mt-8 pt-6 border-t border-white/10 w-full flex justify-between items-center text-sm text-gray-500">
                    <span>Concept #<span id="modal-id">01</span></span>
                    <button class="text-white hover:text-gray-300 transition-colors flex items-center gap-2 group">
                        Explore Related
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full py-6 text-center text-gray-600 text-sm">
        <p>Interactive Visualization based on Human Psychology Frameworks</p>
    </footer>

    <script>
        // Data derived strictly from the image provided
        const concepts = [
            // EMOTIONS (Row 1)
            { id: "emo-1", cat: "Emotions", title: "Emotion", desc: "Mental states which color all thought for a period of time.", x: 18, y: 4, w: 14, h: 14, color: "cat-emotions" },
            { id: "emo-2", cat: "Emotions", title: "Angst", desc: "The fear that your life will be meaningless – which can be a type of motivation.", x: 33, y: 4, w: 14, h: 14, color: "cat-emotions" },
            { id: "emo-3", cat: "Emotions", title: "Empathy / Sympathy", desc: "The ability to share emotions & caring with & for others, & to react appropriately.", x: 48, y: 4, w: 14, h: 14, color: "cat-emotions" },
            { id: "emo-4", cat: "Emotions", title: "Fear", desc: "The dread of failure, uncertainty, risk & loss. A type or instinct or motivation.", x: 63, y: 4, w: 14, h: 14, color: "cat-emotions" },
            { id: "emo-5", cat: "Emotions", title: "Love", desc: "The ability to demonstrate unconditional loyalty, deep affection & benevolent concern for others.", x: 78, y: 4, w: 14, h: 14, color: "cat-emotions" },

            // IDENTITY (Rows 2 & 3)
            { id: "id-1", cat: "Identity", title: "Failure", desc: "Humans are not infallible, so will often make mistakes, misjudge or fail.", x: 18, y: 20, w: 14, h: 14, color: "cat-identity" },
            { id: "id-2", cat: "Identity", title: "Growth", desc: "The drive to explore, improve & grow.", x: 33, y: 20, w: 14, h: 14, color: "cat-identity" },
            { id: "id-3", cat: "Identity", title: "Instinct", desc: "The ability override instinct with higher level though processes.", x: 48, y: 20, w: 14, h: 14, color: "cat-identity" },
            { id: "id-4", cat: "Identity", title: "Intuition", desc: "Opinions & feelings formed by unconscious knowledge & hidden processes.", x: 63, y: 20, w: 14, h: 14, color: "cat-identity" },
            { id: "id-5", cat: "Identity", title: "Need", desc: "Humans are born with physical & emotional needs that must be regularly satisfied to avoid pain & decline.", x: 78, y: 20, w: 14, h: 14, color: "cat-identity" },

            { id: "id-6", cat: "Identity", title: "Motivation", desc: "A wide variety of desires that drive us, as compared to animals – such as finding food & procreating.", x: 18, y: 36, w: 14, h: 14, color: "cat-identity" },
            { id: "id-7", cat: "Identity", title: "Resilience", desc: "Humans can learn from failures, risk-taking & stressors – to become stronger.", x: 33, y: 36, w: 14, h: 14, color: "cat-identity" },
            { id: "id-8", cat: "Identity", title: "Self", desc: "The need to defend what we view as our self-interests, to have a sense of self-esteem & self-importance.", x: 48, y: 36, w: 14, h: 14, color: "cat-identity" },
            { id: "id-9", cat: "Identity", title: "Strengths", desc: "Humans are highly capable & well adapted to life on Planet Earth.", x: 63, y: 36, w: 14, h: 14, color: "cat-identity" },
            { id: "id-10", cat: "Identity", title: "Weakness", desc: "Humans often lack abilities that would be advantageous to their life.", x: 78, y: 36, w: 14, h: 14, color: "cat-identity" },

            // MENTAL (Rows 4 & 5)
            { id: "men-1", cat: "Mental", title: "Communication", desc: "The desire to connect with others using various means of expression (language, art, music, stories...).", x: 18, y: 52, w: 14, h: 14, color: "cat-mental" },
            { id: "men-2", cat: "Mental", title: "Concepts", desc: "Thinking in ways that differ from reality – such as Language having many concepts without a direct physical equivalent.", x: 33, y: 52, w: 14, h: 14, color: "cat-mental" },
            { id: "men-3", cat: "Mental", title: "Experiments", desc: "Human curiosity & activity trying to discover new knowledge.", x: 48, y: 52, w: 14, h: 14, color: "cat-mental" },
            { id: "men-4", cat: "Mental", title: "Imagination", desc: "The ability to think in ways that differ from concrete reality.", x: 63, y: 52, w: 14, h: 14, color: "cat-mental" },
            { id: "men-5", cat: "Mental", title: "Introspection", desc: "The ability to examine our own character, thinking, actions & emotions – in order to self-improve.", x: 78, y: 52, w: 14, h: 14, color: "cat-mental" },

            { id: "men-6", cat: "Mental", title: "Knowledge", desc: "The ability to understand things, & share this information.", x: 18, y: 68, w: 14, h: 14, color: "cat-mental" },
            { id: "men-7", cat: "Mental", title: "Language", desc: "The ability to share by communicating with words & complex thoughts.", x: 33, y: 68, w: 14, h: 14, color: "cat-mental" },
            { id: "men-8", cat: "Mental", title: "Memory", desc: "The ability to remember information for a lifetime. They are often fuzzy & surrounded with emotions such as nostalgia.", x: 48, y: 68, w: 14, h: 14, color: "cat-mental" },
            { id: "men-9", cat: "Mental", title: "Rational Thought", desc: "The ability to consider evidence in a systematic way to form opinions.", x: 63, y: 68, w: 14, h: 14, color: "cat-mental" },
            { id: "men-10", cat: "Mental", title: "Strategy", desc: "The ability to think out a series of action that will achieve a goal in the long term.", x: 78, y: 68, w: 14, h: 14, color: "cat-mental" },

            // SOCIAL (Rows 6 & 7)
            { id: "soc-1", cat: "Social", title: "Altruism", desc: "An unselfish desire to make things better, even if it means personal sacrifice.", x: 18, y: 84, w: 14, h: 14, color: "cat-social" },
            { id: "soc-2", cat: "Social", title: "Civility", desc: "The ability to organize into communities societies & cultures, & to conform to a shared set of rules, in order to live peaceably.", x: 33, y: 84, w: 14, h: 14, color: "cat-social" },
            { id: "soc-3", cat: "Social", title: "Competition", desc: "The ability to engage in social or business challenges, in games, sports & other pursuits.", x: 48, y: 84, w: 14, h: 14, color: "cat-social" },
            { id: "soc-4", cat: "Social", title: "Conflict", desc: "Tendency for civility & diplomacy to break down between individuals or groups.", x: 63, y: 84, w: 14, h: 14, color: "cat-social" },
            { id: "soc-5", cat: "Social", title: "Diplomacy", desc: "The ability of groups / nations to use communication & understanding to resolve differences.", x: 78, y: 84, w: 14, h: 14, color: "cat-social" },

            { id: "soc-6", cat: "Social", title: "Politics", desc: "The process of a group cooperating to resolve power struggles & make decisions through communication.", x: 18, y: 100, w: 14, h: 14, color: "cat-social" },
            { id: "soc-7", cat: "Social", title: "Relatedness", desc: "A desire to connect & interact with other people.", x: 33, y: 100, w: 14, h: 14, color: "cat-social" },
            { id: "soc-8", cat: "Social", title: "Society, Culture, Tradition", desc: "Complex social behavior which develops shares systems, rules, celebrations & meaning.", x: 48, y: 100, w: 14, h: 14, color: "cat-social" },
            { id: "soc-9", cat: "Social", title: "Social Comparison", desc: "We constantly compare ourselves to close & distant others, present or past, good or bad people.", x: 63, y: 100, w: 14, h: 14, color: "cat-social" },
            { id: "soc-10", cat: "Social", title: "Social Status", desc: "The desire to be recognized & respected by others.", x: 78, y: 100, w: 14, h: 14, color: "cat-social" },

            // ACTIVITY (Row 8) - Note: Layout shifts slightly, 7 items
            { id: "act-1", cat: "Activity", title: "Control", desc: "Humans seek to exert influence &/or control over other people & their environment.", x: 18, y: 116, w: 12, h: 14, color: "cat-activity" },
            { id: "act-2", cat: "Activity", title: "Discipline", desc: "The ability to transcend personal desire in order to do what's required in a particular situation.", x: 31, y: 116, w: 12, h: 14, color: "cat-activity" },
            { id: "act-3", cat: "Activity", title: "Play", desc: "The drive to find joy & fun in the world.", x: 44, y: 116, w: 12, h: 14, color: "cat-activity" },
            { id: "act-4", cat: "Activity", title: "Productivity", desc: "The drive to create & produce tangible objects or mental results.", x: 57, y: 116, w: 12, h: 14, color: "cat-activity" },
            { id: "act-5", cat: "Activity", title: "Risk Taking", desc: "The ability to act in an environment of uncertainty & risk in order to pursue opportunities.", x: 70, y: 116, w: 12, h: 14, color: "cat-activity" },
            { id: "act-6", cat: "Activity", title: "Technology", desc: "The lack for making useful tools.", x: 83, y: 116, w: 12, h: 14, color: "cat-activity" },
            { id: "act-7", cat: "Activity", title: "Tactics", desc: "The ability to identify actions that could achieve a short term advantage.", x: 96, y: 116, w: 12, h: 14, color: "cat-activity" }, // Adjusted to fit

            // EXPRESSION (Row 9) - 3 items
            { id: "exp-1", cat: "Expression", title: "Aesthetics", desc: "The ability to feel that elements in the world are beautiful or otherwise appealing.", x: 18, y: 132, w: 22, h: 14, color: "cat-expression" },
            { id: "exp-2", cat: "Expression", title: "Art", desc: "The unconstrained pursuit of expression in a wide variety of forms.", x: 41, y: 132, w: 22, h: 14, color: "cat-expression" },
            { id: "exp-3", cat: "Expression", title: "Creativity", desc: "The ability to produce things from imagination, such as designs or new concepts.", x: 64, y: 132, w: 22, h: 14, color: "cat-expression" },

            // SPIRIT (Row 10) - 5 items
            { id: "spi-1", cat: "Spirit", title: "Epic Meaning", desc: "The desire for experiences that are deeply meaningful to the individual.", x: 18, y: 148, w: 16, h: 14, color: "cat-spirit" },
            { id: "spi-2", cat: "Spirit", title: "Freedom", desc: "Humans also resent being controlled – strongly reacting to attempts at losing their freedom.", x: 35, y: 148, w: 16, h: 14, color: "cat-spirit" },
            { id: "spi-3", cat: "Spirit", title: "Morals", desc: "Commonly adopting principles of right & wrong used to evaluate / judge thoughts & actions.", x: 52, y: 148, w: 16, h: 14, color: "cat-spirit" },
            { id: "spi-4", cat: "Spirit", title: "Philosophy & Spirituality", desc: "The ability to ponder fundamental questions concerning the nature of the universe, & the meaning of life.", x: 69, y: 148, w: 16, h: 14, color: "cat-spirit" },
            { id: "spi-5", cat: "Spirit", title: "Transcendence", desc: "The ability to overcome parts of society or human nature that's inconsistent with your goals.", x: 86, y: 148, w: 16, h: 14, color: "cat-spirit" }
        ];

        const overlayLayer = document.getElementById('overlay-layer');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalContent = document.getElementById('modal-content');
        const closeModalBtn = document.getElementById('close-modal');
        
        // Modal Elements
        const mTitle = document.getElementById('modal-title');
        const mDesc = document.getElementById('modal-description');
        const mCat = document.getElementById('modal-category-badge');
        const mId = document.getElementById('modal-id');

        // Initialize Hotspots
        function initHotspots() {
            concepts.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'interactive-area group';
                
                // Positioning
                el.style.left = `${item.x}%`;
                el.style.top = `${item.y}%`;
                el.style.width = `${item.w}%`;
                el.style.height = `${item.h}%`;
                
                // Accessibility
                el.setAttribute('role', 'button');
                el.setAttribute('tabindex', '0');
                el.setAttribute('aria-label', `View details for ${item.title}`);

                // Inner visual indicator (subtle)
                const indicator = document.createElement('div');
                indicator.className = 'absolute bottom-2 right-2 w-6 h-6 rounded-full bg-white/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300';
                indicator.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
                
                el.appendChild(indicator);

                // Event Listeners
                el.addEventListener('click', () => openModal(item));
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        openModal(item);
                    }
                });

                overlayLayer.appendChild(el);
            });
        }

        function openModal(item) {
            // Populate Data
            mTitle.textContent = item.title;
            mDesc.textContent = item.desc;
            mCat.textContent = item.cat;
            mId.textContent = item.id;
            
            // Styling based on category
            mCat.className = `px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-3 border bg-opacity-20 ${item.color} bg-white/10`;

            // Show Modal
            modalBackdrop.classList.remove('hidden');
            // Small delay to allow display:block to apply before opacity transition
            setTimeout(() => {
                modalBackdrop.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            modalBackdrop.classList.add('opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modalBackdrop.classList.add('hidden');
            }, 300);
        }

        // Close events
        closeModalBtn.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', (e) => {
            if (e.target === modalBackdrop) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modalBackdrop.classList.contains('hidden')) {
                closeModal();
            }
        });

        // Run
        document.addEventListener('DOMContentLoaded', initHotspots);

    </script>
</body>
</html>
