body {
    margin: 0;
    background: #111;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 20px;
}

#container {
    position: relative;
    width: min(1024px, 95vw);
}

#background {
    width: 100%;
    display: block;
    border-radius: 12px;
}

.hotspot {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.2s ease;
}

.hotspot:hover {
    background: rgba(255,255,255,0.18);
}

#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
}

#dialog {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(520px, 90vw);
    background: white;
    border-radius: 18px;
    padding: 24px;
    display: none;
    z-index: 10;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}

#dialog h2 {
    margin-top: 0;
}

.close {
    float: right;
    font-size: 24px;
    cursor: pointer;
}
</style>
</head>

hotspots.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hotspot';

    el.style.left = (h.x * 100) + '%';
    el.style.top = (h.y * 100) + '%';
    el.style.width = (h.w * 100) + '%';
    el.style.height = (h.h * 100) + '%';

    el.addEventListener('click', () => {
        document.getElementById('title').innerText = h.label;
        document.getElementById('content').innerText = h.description;

        document.getElementById('dialog').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    });

    container.appendChild(el);
});

function closeDialog(){
    document.getElementById('dialog').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

document.getElementById('overlay').addEventListener('click', closeDialog);
