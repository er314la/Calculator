<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Elements Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Playfair Display', sans-serif; }

        .background-image {
            background-image: url('IMG_4883.jpeg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 12px;
        }
        .hotspot:hover {
            background-color: rgba(147, 197, 253, 0.15);
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">
    <div class="relative h-screen w-screen flex items-center justify-center p-4">
        <div id="image-container" 
             class="background-image w-full max-w-[1250px] aspect-[1200/850] relative rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
            <!-- Hotspots added by JS -->
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="modal bg-zinc-900 rounded-3xl max-w-lg w-full mx-4 overflow-hidden shadow-2xl">
            <div class="px-8 pt-8 pb-4 border-b border-white/10 flex gap-4">
                <div id="modal-icon" class="text-5xl"></div>
                <div>
                    <h2 id="modal-title" class="text-3xl title-font font-bold"></h2>
                    <p id="modal-category" class="text-blue-400 font-medium tracking-widest"></p>
                </div>
            </div>
            <div class="p-8">
                <p id="modal-description" class="text-zinc-300 leading-relaxed text-[17px]"></p>
            </div>
            <div class="px-8 py-6 bg-black/40 border-t border-white/10 flex justify-end">
                <button onclick="closeModal()" 
                        class="px-10 py-3.5 bg-white hover:bg-amber-50 text-zinc-900 font-semibold rounded-2xl transition">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        const elements = [
            // === EMOTIONS ===
            {title:"Emotion", category:"EMOTIONS", desc:"Mental states which color all thought for a period of time.", x:"7%", y:"6%", w:"11%", h:"11%"},
            {title:"Angst", category:"EMOTIONS", desc:"The fear that your life will be meaningless – which can be a type of motivation.", x:"21%", y:"6%", w:"11%", h:"11%"},
            {title:"Empathy / Sympathy", category:"EMOTIONS", desc:"The ability to share emotions & caring with & for others, & to react appropriately.", x:"35%", y:"6%", w:"11%", h:"11%"},
            {title:"Fear", category:"EMOTIONS", desc:"The dread of failure, uncertainty, risk & loss. A type or instinct or motivation.", x:"50%", y:"6%", w:"11%", h:"11%"},
            {title:"Love", category:"EMOTIONS", desc:"The ability to demonstrate unconditional loyalty, deep affection & benevolent concern for others.", x:"64%", y:"6%", w:"11%", h:"11%"},

            // === IDENTITY ===
            {title:"Failure", category:"IDENTITY", desc:"Humans are not infallible, so will often make mistakes, misjudge or fail.", x:"7%", y:"23%", w:"11%", h:"11%"},
            {title:"Growth", category:"IDENTITY", desc:"The drive to explore, improve & grow.", x:"21%", y:"23%", w:"11%", h:"11%"},
            {title:"Instinct", category:"IDENTITY", desc:"The ability override instinct with higher level thought processes.", x:"35%", y:"23%", w:"11%", h:"11%"},
            {title:"Intuition", category:"IDENTITY", desc:"Opinions & feelings formed by unconscious knowledge & hidden processes.", x:"50%", y:"23%", w:"11%", h:"11%"},
            {title:"Need", category:"IDENTITY", desc:"Humans are born with physical & emotional needs that must be regularly satisfied to avoid pain & decline.", x:"64%", y:"23%", w:"11%", h:"11%"},

            {title:"Motivation", category:"IDENTITY", desc:"A wide variety of desires that drive us...", x:"7%", y:"36.5%", w:"11%", h:"11%"},
            {title:"Resilience", category:"IDENTITY", desc:"Humans can learn from failures, risk-taking & stressors – to become stronger.", x:"21%", y:"36.5%", w:"11%", h:"11%"},
            {title:"Self", category:"IDENTITY", desc:"The need to defend what we view as our self-interests...", x:"35%", y:"36.5%", w:"11%", h:"11%"},
            {title:"Strengths", category:"IDENTITY", desc:"Humans are highly capable & well adapted to life on Planet Earth.", x:"50%", y:"36.5%", w:"11%", h:"11%"},
            {title:"Weakness", category:"IDENTITY", desc:"Humans often lack abilities that would be advantageous to their life.", x:"64%", y:"36.5%", w:"11%", h:"11%"},

            // === MENTAL ===
            {title:"Communication", category:"MENTAL", desc:"The desire to connect with others using various means of expression...", x:"7%", y:"51%", w:"11%", h:"11%"},
            {title:"Concepts", category:"MENTAL", desc:"Thinking in ways that differ from reality...", x:"21%", y:"51%", w:"11%", h:"11%"},
            {title:"Experiments", category:"MENTAL", desc:"Human curiosity & activity trying to discover new knowledge.", x:"35%", y:"51%", w:"11%", h:"11%"},
            {title:"Imagination", category:"MENTAL", desc:"The ability to think in ways that differ from concrete reality.", x:"50%", y:"51%", w:"11%", h:"11%"},
            {title:"Introspection", category:"MENTAL", desc:"The ability to examine our own character, thinking, actions & emotions...", x:"64%", y:"51%", w:"11%", h:"11%"},

            {title:"Knowledge", category:"MENTAL", desc:"The ability to understand things, & share this information.", x:"7%", y:"64%", w:"11%", h:"11%"},
            {title:"Language", category:"MENTAL", desc:"The ability to share by communicating with words & complex thoughts.", x:"21%", y:"64%", w:"11%", h:"11%"},
            {title:"Memory", category:"MENTAL", desc:"The ability to remember information for a lifetime...", x:"35%", y:"64%", w:"11%", h:"11%"},
            {title:"Rational Thought", category:"MENTAL", desc:"The ability to consider evidence in a systematic way to form opinions.", x:"50%", y:"64%", w:"11%", h:"11%"},
            {title:"Strategy", category:"MENTAL", desc:"The ability to think out a series of action that will achieve a goal in the long term.", x:"64%", y:"64%", w:"11%", h:"11%"},

            // === SOCIAL ===
            {title:"Altruism", category:"SOCIAL", desc:"An unselfish desire to make things better, even if it means personal sacrifice.", x:"7%", y:"77%", w:"11%", h:"11%"},
            {title:"Civility", category:"SOCIAL", desc:"The ability to organize into communities, societies & cultures...", x:"21%", y:"77%", w:"11%", h:"11%"},
            {title:"Competition", category:"SOCIAL", desc:"The ability to engage in social or business challenges...", x:"35%", y:"77%", w:"11%", h:"11%"},
            {title:"Conflict", category:"SOCIAL", desc:"Tendency for civility & diplomacy to break down between individuals or groups.", x:"50%", y:"77%", w:"11%", h:"11%"},
            {title:"Diplomacy", category:"SOCIAL", desc:"The ability of groups / nations to use communication & understanding to resolve differences.", x:"64%", y:"77%", w:"11%", h:"11%"},
        ];

        function createHotspots() {
            const container = document.getElementById('image-container');
            elements.forEach(item => {
                const div = document.createElement('div');
                div.className = 'hotspot';
                div.style.left = item.x;
                div.style.top = item.y;
                div.style.width = item.w;
                div.style.height = item.h;
                div.onclick = () => showModal(item);
                container.appendChild(div);
            });
        }

        function showModal(item) {
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-category').textContent = item.category;
            document.getElementById('modal-description').textContent = item.desc;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        window.onload = () => {
            createHotspots();

            document.getElementById('modal').addEventListener('click', e => {
                if (e.target === document.getElementById('modal')) closeModal();
            });

            document.addEventListener('keydown', e => {
                if (e.key === "Escape") closeModal();
            });
        };
    </script>
</body>
</html>
