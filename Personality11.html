<style>
  :root {
    --bg-dark: #0f172a;
    --glass-bg: rgba(15, 23, 42, 0.85);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #e2e8f0;
    --text-muted: #94a3b8;
  }

  body {
    margin: 0;
    background-color: var(--bg-dark);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: var(--text-main);
  }

  #container {
    position: relative;
    width: min(1024px, 95vw);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--glass-border);
  }

  #background {
    width: 100%;
    display: block;
    filter: contrast(1.05) brightness(0.95); 
  }

  .hotspot {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(0, 0, 0, 0);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 0 0px rgba(255, 255, 255, 0);
    z-index: 2;
  }

  .hotspot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 14px;
    border: 1px solid transparent;
    transition: all 0.3s ease;
  }

  .hotspot:hover {
    background: rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 0.8);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    transform: translate(-50%, -50%) scale(1.05);
    z-index: 10;
  }

  /* Overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    display: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 50;
  }

  #overlay.active {
    display: block;
    opacity: 1;
  }

  /* Dialog / Modal */
  #dialog {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    width: min(560px, 90vw);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 0;
    display: none;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
  }

  #dialog.active {
    display: block;
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .dialog-header {
    padding: 24px 24px 16px;
    position: relative;
    border-bottom: 1px solid var(--glass-border);
  }

  .dialog-color-strip {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: var(--trait-color, #ccc);
  }

  .dialog-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .dialog-icon {
    font-size: 32px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  .dialog-category {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    color: var(--trait-color, #fff);
    border: 1px solid var(--trait-color, #fff);
  }

  #dialog h2 {
    margin: 0;
    font-size: 1.75rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .close {
    position: absolute;
    top: 16px;
    right: 20px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-muted);
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    transition: all 0.2s ease;
    border: none;
    outline: none;
    padding-bottom: 4px;
  }

  .close:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    transform: rotate(90deg);
  }

  .dialog-body {
    padding: 20px 24px 28px;
    max-height: 60vh;
    overflow-y: auto;
  }

  #content {
    margin: 0;
    font-size: 1.05rem;
    line-height: 1.65;
    color: var(--text-main);
  }

  #content p {
    margin-bottom: 1.2em;
  }

  #content p:last-child {
    margin-bottom: 0;
  }

  /* Responsive adjustments */
  @media (max-width: 640px) {
    .dialog-header { padding: 20px 20px 12px; }
    .dialog-body { padding: 16px 20px 24px; }
    #dialog h2 { font-size: 1.5rem; }
  }
</style>
</head>

  hotspots.forEach(h => {
    const traitData = traits[h.id];
    if (!traitData) return;

    const el = document.createElement('div');
    el.className = 'hotspot';
    
    el.style.left = (h.x * 100) + '%';
    el.style.top = (h.y * 100) + '%';
    el.style.width = (h.w * 100) + '%';
    el.style.height = (h.h * 100) + '%';
    
    el.title = traitData.title;

    el.addEventListener('click', () => {
      openDialog(traitData);
    });

    container.appendChild(el);
  });

  // Dialog Logic
  const overlay = document.getElementById('overlay');
  const dialog = document.getElementById('dialog');
  const titleEl = document.getElementById('title');
  const contentEl = document.getElementById('content');
  const iconEl = document.getElementById('modalIcon');
  const catEl = document.getElementById('modalCategory');
  const colorStrip = document.getElementById('colorStrip');

  function openDialog(data) {
    titleEl.innerText = data.title;
    contentEl.innerHTML = `<p>${data.desc}</p>`;
    iconEl.innerText = data.icon;
    catEl.innerText = data.cat;
    
    document.documentElement.style.setProperty('--trait-color', data.color);
    colorStrip.style.backgroundColor = data.color;
    catEl.style.color = data.color;
    catEl.style.borderColor = data.color;

    overlay.classList.add('active');
    dialog.classList.add('active');
  }

  function closeDialog() {
    overlay.classList.remove('active');
    dialog.classList.remove('active');
  }

  overlay.addEventListener('click', closeDialog);
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && dialog.classList.contains('active')) {
      closeDialog();
    }
  });
